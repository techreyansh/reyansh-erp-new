<!-- @dsCard group="Dashboard Widgets" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KPI Stat Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "Inter", system-ui, sans-serif; background: #F2F5F7; color: #2D3D4C; padding: 28px; }
  h1 { font-family: "Montserrat", sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.02em; }
  .sub { color: #81898F; font-size: 13px; margin: 4px 0 22px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .kpi { background: #fff; border: 1px solid #E2E8ED; border-radius: 8px; padding: 16px; box-shadow: 0 2px 4px rgba(15,23,42,0.04); position: relative; overflow: hidden; }
  .kpi::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .kpi.p::before { background: #45ADE6; }
  .kpi.s::before { background: #059669; }
  .kpi.w::before { background: #D97706; }
  .kpi.e::before { background: #C0392B; }
  .kpi .label { font-size: 12px; color: #81898F; font-weight: 600; }
  .kpi .value { font-family: "Montserrat"; font-weight: 800; font-size: 28px; letter-spacing: -0.02em; margin: 8px 0 4px; }
  .delta { font-size: 12px; font-weight: 600; }
  .up { color: #059669; }
  .down { color: #C0392B; }
</style>
</head>
<body>
  <h1>KPI Stat Cards</h1>
  <div class="sub">Dashboard tiles with a semantic accent rail and trend delta. Attention-first layout.</div>
  <div class="grid">
    <div class="kpi p"><div class="label">Open orders</div><div class="value">42</div><div class="delta up">▲ 8% vs last week</div></div>
    <div class="kpi s"><div class="label">Dispatched today</div><div class="value">17</div><div class="delta up">▲ 3 on target</div></div>
    <div class="kpi w"><div class="label">QC holds</div><div class="value">5</div><div class="delta down">▲ 2 needs review</div></div>
    <div class="kpi e"><div class="label">Overdue</div><div class="value">3</div><div class="delta down">▼ 1 since Mon</div></div>
  </div>
</body>
</html>
