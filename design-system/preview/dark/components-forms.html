<!-- @dsCard group="Components · Dark" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Form Inputs · Dark</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "Inter", system-ui, sans-serif; background: #1E2B38; color: #F2F5F7; padding: 28px; }
  h1 { font-family: "Montserrat", sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.02em; }
  .sub { color: #A9B2BA; font-size: 13px; margin: 4px 0 22px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #A9B2BA; margin-bottom: 6px; }
  .input { width: 100%; border-radius: 8px; padding: 11px 13px; font-size: 14px; font-family: "Inter"; background: #2D3D4C; border: 1.5px solid #475569; color: #F2F5F7; }
  .input.focus { border: 2px solid #45ADE6; box-shadow: 0 0 0 3px rgba(69,173,230,0.2); padding: 10px 12px; }
  .input.error { border: 2px solid #E05548; box-shadow: 0 0 0 3px rgba(248,113,113,0.2); padding: 10px 12px; }
  .hint { font-size: 11px; margin-top: 6px; color: #A9B2BA; }
  .hint.err { color: #EC7468; }
  .placeholder { color: #6B767E; }
</style>
</head>
<body>
  <h1>Form Inputs · Dark</h1>
  <div class="sub">Inputs sit on paper with a muted border; primary ring on focus, error ring on invalid.</div>
  <div class="grid">
    <div class="field">
      <label>Client name</label>
      <div class="input">Reyansh International</div>
      <div class="hint">Default · rest state</div>
    </div>
    <div class="field">
      <label>Order quantity</label>
      <div class="input focus">1200</div>
      <div class="hint">Focused · primary ring</div>
    </div>
    <div class="field">
      <label>GST number</label>
      <div class="input error">29ABCDE</div>
      <div class="hint err">Invalid GSTIN — must be 15 characters</div>
    </div>
    <div class="field">
      <label>Dispatch date</label>
      <div class="input"><span class="placeholder">dd / mm / yyyy</span></div>
      <div class="hint">Empty · placeholder</div>
    </div>
  </div>
</body>
</html>
