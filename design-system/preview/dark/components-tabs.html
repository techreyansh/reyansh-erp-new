<!-- @dsCard group="Components · Dark" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tabs · Dark</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "Inter", system-ui, sans-serif; background: #1E2B38; color: #F2F5F7; padding: 28px; }
  h1 { font-family: "Montserrat", sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.02em; }
  .sub { color: #A9B2BA; font-size: 13px; margin: 4px 0 22px; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid rgba(226,232,237,0.12); }
  .tab { position: relative; padding: 14px 18px; font-size: 14px; font-weight: 500; color: #A9B2BA; cursor: pointer; }
  .tab.active { color: #84D2FC; font-weight: 600; }
  .tab.active::after { content: ""; position: absolute; left: 12px; right: 12px; bottom: -1px; height: 2px; background: #45ADE6; border-radius: 2px; }
  .panel { background: #2D3D4C; border: 1px solid rgba(226,232,237,0.12); border-top: none; border-radius: 0 0 8px 8px; padding: 22px; font-size: 14px; color: #A9B2BA; }
</style>
</head>
<body>
  <h1>Tabs · Dark</h1>
  <div class="sub">Inactive tabs read muted grey, active brightens to primary-light with a 2px indicator.</div>
  <div class="tabs">
    <div class="tab active">Overview</div>
    <div class="tab">Production log</div>
    <div class="tab">Materials</div>
    <div class="tab">Dispatch</div>
  </div>
  <div class="panel">Overview content — KPI cards, recent orders, and the production timeline render here.</div>
</body>
</html>
